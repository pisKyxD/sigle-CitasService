server.port=8082
spring.application.name=citas-service

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sigle_citas?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=sigle_user
spring.datasource.password=sigle_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.citasService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.citasService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.citasService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.citasService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.citasService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.citasService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.citasService.automaticTransitionFromOpenToHalfOpenEnabled=true

# Resilience4j Retry
resilience4j.retry.instances.citasService.maxAttempts=3
resilience4j.retry.instances.citasService.waitDuration=500ms