server.port=8082
spring.application.name=citas-service

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sigle_citas?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=sigle_user
spring.datasource.password=sigle_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
